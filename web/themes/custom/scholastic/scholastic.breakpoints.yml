scholastic.xs:
  label: 'Extra small'
  mediaQuery: '(max-width: 575.98px)'
  weight: 0
  multipliers:
    - 1x

scholastic.sm:
  label: Small
  mediaQuery: '(min-width: 576px)'
  weight: 1
  multipliers:
    - 1x

scholastic.md:
  label: Medium
  mediaQuery: '(min-width: 768px)'
  weight: 2
  multipliers:
    - 1x

scholastic.lg:
  label: Large
  mediaQuery: '(min-width: 992px)'
  weight: 3
  multipliers:
    - 1x

scholastic.xl:
  label: 'Extra large'
  mediaQuery: '(min-width: 1200px)'
  weight: 4
  multipliers:
    - 1x

scholastic.xxl:
  label: 'Extra extra large'
  mediaQuery: '(min-width: 1400px)'
  weight: 5
  multipliers:
    - 1x
