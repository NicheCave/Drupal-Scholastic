# ─────────────────────────────────────────────────────────────────────────────
# Scholastic Theme Libraries
# All external assets loaded from jsDelivr CDN (fast, SRI-safe).
# Bootstrap 5.3 is the CSS/JS foundation — loaded before theme overrides.
# Material Symbols Outlined provides the icon font used by field_icon fields.
# ─────────────────────────────────────────────────────────────────────────────

global-styling:
  css:
    theme:
      # 1. Bootstrap 5.3 — must come first so our overrides win
      'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css': { type: external, minified: true }
      # 2. Bootstrap Icons — SVG icon font (bi bi-* classes)
      'https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css': { type: external, minified: true }
      # 3. Material Symbols Outlined — icon font used by field_icon paragraph fields
      'https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200': { type: external, minified: true }
      # 4. Google Fonts — Manrope (headings) + Inter (body)
      'https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap': { type: external, minified: true }
      # 5. Theme overrides — always last
      css/base/global.css: {}
  js:
    # Bootstrap 5 bundle (includes Popper for dropdowns/tooltips)
    'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js': { type: external, minified: true }
    # Theme behaviours
    js/scholastic.js: {}
  dependencies:
    - core/drupal

# ── Component libraries (attached per-template) ──────────────────────────────

node--about:
  css:
    component:
      css/components/node--about.css: {}

block--hero:
  css:
    component:
      css/components/hero-block.css: {}

block--feature-grid:
  css:
    component:
      css/components/feature-grid.css: {}

page--user-auth:
  css:
    component:
      css/components/user-auth.css: {}
